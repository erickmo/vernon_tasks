name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-test:
    name: Backend — bench run-tests
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_frappe
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frappe-bench
        run: pip install frappe-bench

      - name: Init bench and install app
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          bench init --frappe-branch version-15 --skip-redis-config-generation frappe-bench
          cd frappe-bench
          # Point bench at the CI redis service (port 6379); bench defaults to
          # 11000/12000/13000 which don't exist on the runner.
          bench set-config -g redis_cache "redis://127.0.0.1:6379"
          bench set-config -g redis_queue "redis://127.0.0.1:6379"
          bench set-config -g redis_socketio "redis://127.0.0.1:6379"
          bench new-site test.localhost \
            --mariadb-root-password root \
            --admin-password admin \
            --no-mariadb-socket
          bench get-app "$GITHUB_WORKSPACE"
          bench --site test.localhost install-app vernon_tasks

      - name: Install coverage tooling
        run: pip install pytest-cov coverage

      - name: Run backend tests with coverage
        run: |
          cd frappe-bench
          bench --site test.localhost run-tests --app vernon_tasks --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: frappe-bench/coverage.xml
          if-no-files-found: warn
